<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Webhook Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>🔧 n8n Webhook Connection Test</h1>
    
    <div class="info result">
        <strong>Step 1:</strong> Test if n8n server is running
    </div>
    <button onclick="testServer()" class="btn-primary">Test n8n Server</button>
    <div id="serverResult"></div>
    
    <div class="info result">
        <strong>Step 2:</strong> Test webhook endpoint
    </div>
    <button onclick="testWebhook()" class="btn-success">Test Webhook POST</button>
    <div id="webhookResult"></div>
    
    <div class="info result">
        <strong>Step 3:</strong> Test with Razorpay format
    </div>
    <button onclick="testRazorpayFormat()" class="btn-danger">Test Razorpay Format</button>
    <div id="razorpayResult"></div>
    
    <div class="info result">
        <strong>Step 4:</strong> Check n8n executions
    </div>
    <p>Open n8n dashboard → Executions → Look for recent executions</p>
    
    <script>
        async function testServer() {
            const result = document.getElementById('serverResult');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://n8nnserver.duckdns.org');
                if (response.ok) {
                    result.className = 'result success';
                    result.innerHTML = '✅ n8n server is running and accessible!';
                } else {
                    result.className = 'result error';
                    result.innerHTML = '❌ n8n server responded with status: ' + response.status;
                }
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = '❌ Cannot connect to n8n server: ' + error.message;
            }
        }
        
        async function testWebhook() {
            const result = document.getElementById('webhookResult');
            result.innerHTML = 'Testing webhook...';
            
            try {
                const response = await fetch('https://n8nnserver.duckdns.org/webhook/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        test: 'simple_webhook_test',
                        timestamp: new Date().toISOString()
                    })
                });
                
                const text = await response.text();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.innerHTML = '✅ Webhook POST successful! Response: ' + text;
                } else {
                    result.className = 'result error';
                    result.innerHTML = '❌ Webhook failed. Status: ' + response.status + '<br>Response: ' + text;
                }
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = '❌ Webhook error: ' + error.message;
            }
        }
        
        async function testRazorpayFormat() {
            const result = document.getElementById('razorpayResult');
            result.innerHTML = 'Testing Razorpay format...';
            
            try {
                const response = await fetch('https://n8nnserver.duckdns.org/webhook/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-razorpay-signature': 'test_signature_123'
                    },
                    body: JSON.stringify({
                        event: 'payment_link.paid',
                        payload: {
                            payment_link: {
                                entity: {
                                    customer: {
                                        name: 'Test User',
                                        email: 'test@example.com',
                                        contact: '+919876543210'
                                    }
                                }
                            },
                            payment: {
                                entity: {
                                    id: 'pay_test_123456',
                                    status: 'captured',
                                    amount: 1900,
                                    currency: 'INR'
                                }
                            }
                        }
                    })
                });
                
                const text = await response.text();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.innerHTML = '✅ Razorpay format working! Response: ' + text;
                } else {
                    result.className = 'result error';
                    result.innerHTML = '❌ Razorpay format failed. Status: ' + response.status + '<br>Response: ' + text;
                }
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = '❌ Razorpay format error: ' + error.message;
            }
        }
        
        // Auto-run server test on page load
        window.onload = function() {
            setTimeout(testServer, 1000);
        };
    </script>
</body>
</html>
